<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>

  <!-- Click firework canvas overlay (full-viewport, pointer-events: none) -->
  <canvas id="click-fx"></canvas>

  <!-- Shortcuts section -->
  <div id="shortcuts-section">
    <div id="shortcuts"></div>
    <div id="shortcut-form-panel" hidden>
      <input id="sf-name" type="text" placeholder="Site name" autocomplete="off">
      <input id="sf-url"  type="text" placeholder="https://example.com" autocomplete="off">
      <div class="sf-buttons">
        <button id="sf-save">Save</button>
        <button id="sf-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Bookmarks bar -->
  <div id="bookmarks-bar"></div>
  <!-- Folder dropdown (shared, repositioned on each open) -->
  <div id="bookmark-dropdown" hidden></div>
  <!-- Bookmark right-click context menu -->
  <div id="bm-ctx-menu" hidden>
    <button id="bm-ctx-edit">Edit</button>
    <button id="bm-ctx-delete">Delete</button>
  </div>
  <!-- Bookmark inline edit panel (fixed, appears near cursor) -->
  <div id="bm-edit-panel" hidden>
    <input id="bm-edit-title" type="text" placeholder="Name" autocomplete="off">
    <input id="bm-edit-url" type="text" placeholder="URL" autocomplete="off">
    <div class="bm-edit-btns">
      <button id="bm-edit-save">Save</button>
      <button id="bm-edit-cancel">Cancel</button>
    </div>
  </div>

  <!-- Tab dashboard -->
  <div id="topbar">
    <div id="search-wrapper">
      <input id="search" type="text" placeholder="Search tabs…" autocomplete="off" spellcheck="false">
      <button id="search-clear" hidden aria-label="Clear search">×</button>
    </div>
    <span id="summary"></span>
  </div>
  <div id="grid"></div>

  <!-- Chrome utility quick-access bar -->
  <div id="chrome-utils">
    <button class="util-btn" data-url="chrome://settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </button>
    <button class="util-btn" data-url="chrome://flags">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
        <line x1="4" y1="22" x2="4" y2="15"/>
      </svg>
      <span>Flags</span>
    </button>
    <button class="util-btn" data-url="chrome://extensions">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20.5 11H19V7a2 2 0 0 0-2-2h-4V3.5a2.5 2.5 0 0 0-5 0V5H4a2 2 0 0 0-2 2v3.8h1.5a2.5 2.5 0 0 1 0 5H2V20a2 2 0 0 0 2 2h3.8v-1.5a2.5 2.5 0 0 1 5 0V22H17a2 2 0 0 0 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z"/>
      </svg>
      <span>Extensions</span>
    </button>
    <button class="util-btn" data-url="chrome://bookmarks">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Bookmarks</span>
    </button>
    <button class="util-btn" data-url="chrome://history">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>History</span>
    </button>
    <button class="util-btn" data-url="chrome://downloads">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span>Downloads</span>
    </button>
  </div>

  <!-- Custom context menu for shortcuts -->
  <div id="ctx-menu" hidden>
    <button id="ctx-edit">Edit</button>
    <button id="ctx-remove">Remove</button>
  </div>

  <!-- Theme switcher (top-right) -->
  <div id="theme-switcher">
    <div id="theme-modes">
      <button class="theme-mode-btn" data-mode="day" type="button">
        <span class="theme-mode-bubble theme-bubble-day"></span>
        <span class="theme-mode-label">Day</span>
      </button>
      <button class="theme-mode-btn" data-mode="night" type="button">
        <span class="theme-mode-bubble theme-bubble-night"></span>
        <span class="theme-mode-label">Night</span>
      </button>
      <button class="theme-mode-btn" data-mode="system" type="button">
        <span class="theme-mode-bubble theme-bubble-system"></span>
        <span class="theme-mode-label">System</span>
      </button>
    </div>
    <div id="theme-colors" hidden></div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
